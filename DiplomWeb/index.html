<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiplomWeb</title>

  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__logo">D</div>
        <div class="brand__text">
          <div class="brand__title">DiplomWeb</div>
          <div class="brand__subtitle">Управление направлениями</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav__item" data-route="login">Вход</button>
        <button class="nav__item" data-route="register">Регистрация</button>
        <button class="nav__item" data-route="dashboard">Панель</button>
        <button class="nav__item" data-route="drafts">Черновики</button>
        <button class="nav__item" data-route="create">Создать направление</button>
      </nav>

      <div class="sidebar__footer">
        <button class="button button--ghost" id="themeToggle">Сменить тему</button>
        <button class="button button--ghost" id="logoutButton">Выйти</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1 class="topbar__title" id="pageTitle">DiplomWeb</h1>
          <p class="topbar__subtitle" id="pageSubtitle">Рабочая панель</p>
        </div>
        <div class="topbar__user" id="userInfo">Не авторизован</div>
      </header>

      <section class="page-container" id="app"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
